name: Auto-update composer.lock

on:
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "web/composer.json"

permissions:
  contents: write

jobs:
  update-composer-lock:
    runs-on: ubuntu-latest
    # Only run on PRs from the same repo (not forks), since we need write access
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          # Needed so the push triggers other workflows (e.g. CI)
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: ctype, iconv, intl

      - name: Regenerate composer.lock
        working-directory: web
        env:
          COMPOSER_NO_INTERACTION: 1
        run: composer update

      - name: Check for composer.lock changes
        id: changes
        run: |
          if git diff --quiet web/composer.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated composer.lock
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/composer.lock
          git commit -m "chore(web): auto-update composer.lock [skip ci]"
          git push
