security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            security: false   # 🔴 IMPORTANT → désactive l'authentification

    access_control:
        - { path: ^/admin/consultation, roles: PUBLIC_ACCESS }
        - { path: ^/medecin/consultation, roles: PUBLIC_ACCESS }
