# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    gemini_api_key: "%env(GEMINI_API_KEY)%"
    app.news_api_key: '%env(NEWS_API_KEY)%'
    app.ai_triage_api_key: '%env(default::AI_TRIAGE_API_KEY)%'
    app.ai_triage_endpoint: '%env(default::AI_TRIAGE_ENDPOINT)%'
    app.gemini_api_key: '%env(GEMINI_API_KEY)%'
    app.supabase_pharmacie_a_url: '%env(SUPABASE_PHARMACIE_A_URL)%'
    app.supabase_pharmacie_a_key: '%env(SUPABASE_PHARMACIE_A_KEY)%'
    app.supabase_pharmacie_b_url: '%env(SUPABASE_PHARMACIE_B_URL)%'
    app.supabase_pharmacie_b_key: '%env(SUPABASE_PHARMACIE_B_KEY)%'

services:
    # default configuration for services in *this* file
    App\Service\MedicalScoreCalculator: ~

    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            $apiKey: '%env(NEWS_API_KEY)%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: "../src/"
        exclude:
            - "../src/DependencyInjection/"
            - "../src/Entity/"
            - "../src/Kernel.php"

    # Gemini AI Service (Ahmed - constantes vitales)
    App\Service\GeminiService:
        arguments:
            $geminiApiKey: "%gemini_api_key%"

    App\Service\MailingService:
        arguments:
            $senderEmail: '%env(MAILER_SENDER_EMAIL)%'
            $senderName: '%env(MAILER_SENDER_NAME)%'

    # Services des autres modules
    App\Service\MedicalScoreCalculator:
        # Pas besoin d'arguments, Symfony injectera automatiquement

    App\Service\SmsService:
        arguments:
            $accountSid: '%env(TWILIO_SID)%'
            $authToken: '%env(TWILIO_TOKEN)%'
            $fromNumber: '%env(TWILIO_FROM)%'

    App\Service\PdfGeneratorService:
        arguments:
            $apiKey: '%env(PDF_CO_API_KEY)%'

    App\Service\AIConclusionService:
        arguments:
            $httpClient: '@http_client'
            $logger: '@logger'

    App\Service\NewsHealthService:
        arguments:
            $apiKey: '%app.news_api_key%'

    App\Service\SymptomTriageService:
        arguments:
            $endpoint: '%app.ai_triage_endpoint%'
            $apiKey: '%app.ai_triage_api_key%'

    App\Service\GeminiChatService:
        arguments:
            $geminiApiKey: '%app.gemini_api_key%'

    App\Service\PharmacieApiService:
        arguments:
            $pharmacies:
                -
                    name: 'Pharmacie Centrale'
                    url: '%app.supabase_pharmacie_a_url%'
                    key: '%app.supabase_pharmacie_a_key%'
                    table: 'inventaire_pharmacie'
                -
                    name: 'Pharmacie du Lac'
                    url: '%app.supabase_pharmacie_b_url%'
                    key: '%app.supabase_pharmacie_b_key%'
                    table: 'inventaire_pharmacie_b'
